<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Meal Planner</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="loading-bar"></div>
<div id="error-banner"></div>

<!-- ── Login ─────────────────────────────────────────────── -->
<div id="screen-login">
  <div class="login-logo">Meal Planner</div>
  <div class="login-sub">Dietitian-aligned · Batch cook · For 2</div>
  <div class="login-card">
    <p>Sign in with the Google account that has access to your meal planner spreadsheet.</p>
    <button id="btn-signin" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 48 48" fill="none">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────── -->
<div id="screen-app">

  <!-- Section switcher -->
  <div class="section-switcher">
    <button class="section-tab active" data-section="shopping">🛒 Shopping</button>
    <button class="section-tab" data-section="recipes">📖 Recipes</button>
    <button class="section-tab" data-section="planner">📅 Planner</button>
  </div>

  <!-- ══ SHOPPING SECTION ══════════════════════════════════ -->
  <div id="shopping-section">
    <div class="top-nav">
      <button class="nav-tab active" data-tab="meals">
        <span class="nav-icon">🍽</span><span class="nav-label">Meals</span>
        <span class="nav-badge" id="badge-meals" style="display:none">0</span>
      </button>
      <button class="nav-tab" data-tab="household">
        <span class="nav-icon">🧹</span><span class="nav-label">Household</span>
      </button>
      <button class="nav-tab" data-tab="snacks-shop">
        <span class="nav-icon">🍬</span><span class="nav-label">Snacks</span>
      </button>
    </div>
    <div class="actions-bar">
      <div id="header-actions-meals" style="display:flex;gap:6px">
        <button id="btn-refresh" class="btn btn-ghost btn-sm">Refresh</button>
        <button id="btn-signout" class="btn btn-ghost btn-sm">Sign out</button>
      </div>
      <div id="header-actions-list" style="display:none;gap:6px">
        <button id="btn-uncheck" class="btn btn-ghost btn-sm">Uncheck all</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('btn-refresh').click()">Refresh</button>
      </div>
    </div>
    <main class="app-main">
      <!-- Meals list (driven by Planner selections) -->
      <div id="screen-meals-list">
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="progress-label" id="progress-label">0 of 0 items ticked</div>
        </div>
        <div id="shopping-list"></div>
      </div>
      <!-- Household -->
      <div id="screen-household" style="display:none">
        <div id="household-content"></div>
      </div>
      <!-- Snacks shopping -->
      <div id="screen-snacks-shop" style="display:none">
        <div id="snacks-content"></div>
      </div>
    </main>
  </div>

  <!-- ══ RECIPES SECTION ═══════════════════════════════════ -->
  <div id="recipes-section" style="display:none">
    <div class="top-nav">
      <button class="rec-tab active" data-tab="breakfast"><span class="nav-icon">🌅</span><span class="nav-label">Breakfast</span></button>
      <button class="rec-tab" data-tab="lunch"><span class="nav-icon">🥗</span><span class="nav-label">Lunch</span></button>
      <button class="rec-tab" data-tab="dinner"><span class="nav-icon">🍲</span><span class="nav-label">Dinner</span></button>
    </div>
    <div class="actions-bar">
      <div style="display:flex;gap:6px">
        <button id="btn-refresh-r" class="btn btn-ghost btn-sm">Refresh</button>
        <button id="btn-signout-r" class="btn btn-ghost btn-sm">Sign out</button>
      </div>
    </div>
    <main class="app-main">
      <div id="recipes-meal-list-wrap">
        <div id="recipe-person-filter" class="person-filter"></div>
        <div id="recipes-meal-list" class="meal-list"></div>
      </div>
      <div id="cook-mode" style="display:none"></div>
    </main>
  </div>

  <!-- ══ PLANNER SECTION ═══════════════════════════════════ -->
  <div id="planner-section" style="display:none">
    <main class="app-main">
      <div id="planner-content"></div>
    </main>
  </div>

</div><!-- end screen-app -->

<script src="https://accounts.google.com/gsi/client" onload="onGisLoad()" async defer></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="sheets.js"></script>
<script src="household.js"></script>
<script src="snacks.js"></script>
<script src="planner.js"></script>
<script src="app.js"></script>

</body>
</html>
